name: cinematch_ai
description: "CineMatch AI - Filmový expert s Gemini a Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0       # Na prihlásenie
  cloud_firestore: ^5.6.2     # Na ukladanie histórie (namiesto Realtime Database)
  google_generative_ai: ^0.4.0 # Táto knižnica ovláda AI (Gemini)
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  http: ^1.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true